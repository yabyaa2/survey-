<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セキュリティ確認フォーム</title>

<style>
body {
  margin: 0;
  background: #0b1e3c;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
}

.container {
  width: 400px;
  margin: 40px 0;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
  color: black;
}

h2 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #4da3ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2d8cff;
}
</style>

</head>

<body>

<div class="container" id="main">

  <div class="card">
    <h2>セキュリティ確認フォーム</h2>
  </div>

  <!-- ① -->
  <div class="card">
    <p>① よく使うSNSは？</p>
    <label style="display:block;"><input type="radio" name="q1" style="width:auto; margin-right:5px;"> Instagram</label>
    <label style="display:block;"><input type="radio" name="q1" style="width:auto; margin-right:5px;"> X</label>
    <label style="display:block;"><input type="radio" name="q1" style="width:auto; margin-right:5px;"> TikTok</label>
  </div>

  <!-- ② -->
  <div class="card">
    <p>② パスワードの管理方法</p>
    <label style="display:block;"><input type="checkbox" style="width:auto; margin-right:5px;"> メモしている</label>
    <label style="display:block;"><input type="checkbox" style="width:auto; margin-right:5px;"> 覚えている</label>
    <label style="display:block;"><input type="checkbox" style="width:auto; margin-right:5px;"> 使い回している</label>
  </div>

  <!-- ③ -->
  <div class="card">
    <p>③ メールアドレス</p>
    <input type="text" placeholder="example@email.com"
      style="width:100%; padding:10px; box-sizing:border-box;">
  </div>

  <!-- ④ -->
  <div class="card">
    <p>④ 不審なメールを受け取ったことは？</p>
    <label style="display:block;"><input type="radio" name="q4" style="width:auto; margin-right:5px;"> ある</label>
    <label style="display:block;"><input type="radio" name="q4" style="width:auto; margin-right:5px;"> ない</label>
  </div>

  <!-- ⑤ -->
  <div class="card">
    <p>⑤ URLを確認する習慣は？</p>
    <label style="display:block;"><input type="radio" name="q5" style="width:auto; margin-right:5px;"> ある</label>
    <label style="display:block;"><input type="radio" name="q5" style="width:auto; margin-right:5px;"> ない</label>
  </div>

  <!-- ⑥ -->
  <div class="card">
    <p>⑥ 自由記述（気になること）</p>
    <input type="text" placeholder="自由に入力"
      style="width:100%; padding:10px; box-sizing:border-box;">
  </div>

  <div class="card">
    <button onclick="submitForm()">送信</button>
  </div>

</div>

<!-- 右下注意 -->
<p style="
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #ccc;
  background: rgba(0,0,0,0.5);
  padding: 5px 8px;
  border-radius: 5px;
">
  ※これはフィッシング対策の学習用デモです
</p>

<script>
function submitForm() {
  document.getElementById("main").innerHTML = `
    <div class="card">
      <h2>送信中...</h2>
      <p>データを処理しています</p>
      <br>
      <p style="color:red;">
        ⚠ これはフィッシング詐欺のデモです<br><br>
        このような画面で個人情報を入力しないよう注意しましょう。<br><br>
        ・URLを確認する<br>
        ・不自然な要求に注意<br>
        ・公式サイトからアクセスする
      </p>
    </div>
  `;
}
</script>

</body>
</html>
</script>

</body>
</html>
