<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セキュリティ確認フォーム</title>

<style>
body {
  margin: 0;
  background: #0b1e3c;
  font-family: sans-serif;
}

/* ヘッダー */
.header {
  background: #122b57;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* コンテナ */
.container {
  width: 420px;
  margin: 30px auto;
}

/* カード */
.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
  color: black;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* 入力 */
input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  box-sizing: border-box;
}

/* ラベル */
label {
  display: block;
  margin: 6px 0;
}

/* ボタン */
button {
  width: 100%;
  padding: 12px;
  background: #4da3ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2d8cff;
}
</style>

</head>

<body>

<div class="header">
  アカウントセキュリティ確認
</div>

<div class="container" id="main">

  <div class="card">
    <p>以下の内容をご確認ください。</p>
  </div>

  <!-- ① -->
  <div class="card">
    <p>① 最近、アカウントの異常なログイン通知を受け取りましたか？</p>
    <label><input type="radio" name="q1"> はい</label>
    <label><input type="radio" name="q1"> いいえ</label>
  </div>

  <!-- ② -->
  <div class="card">
    <p>② 現在使用しているパスワードの管理方法を選択してください</p>
    <label><input type="checkbox"> 紙やメモに記録している</label>
    <label><input type="checkbox"> 同じパスワードを使い回している</label>
    <label><input type="checkbox"> パスワード管理ツールを使用している</label>
  </div>

  <!-- ③ -->
  <div class="card">
    <p>③ 登録メールアドレスを入力してください</p>
    <input type="text" placeholder="example@email.com">
  </div>

  <!-- ④ -->
  <div class="card">
    <p>④ 最近受信したメールに不審なリンクは含まれていましたか？</p>
    <label><input type="radio" name="q4"> 含まれていた</label>
    <label><input type="radio" name="q4"> 含まれていない</label>
    <label><input type="radio" name="q4"> わからない</label>
  </div>

  <!-- ⑤ -->
  <div class="card">
    <p>⑤ 以下のうち当てはまるものを選択してください</p>
    <label><input type="checkbox"> URLを確認せずにアクセスすることがある</label>
    <label><input type="checkbox"> 不明な送信元のメールを開くことがある</label>
    <label><input type="checkbox"> 添付ファイルをよく確認せず開くことがある</label>
  </div>

  <!-- ⑥ -->
  <div class="card">
    <p>⑥ セキュリティに関して不安な点があれば入力してください</p>
    <input type="text" placeholder="自由記述">
  </div>

  <div class="card">
    <button onclick="submitForm()">確認する</button>
  </div>

</div>

<!-- 注意 -->
<p style="
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #ccc;
  background: rgba(0,0,0,0.5);
  padding: 5px 8px;
  border-radius: 5px;
">
  ※これはフィッシング対策の学習用デモです
</p>

<script>
function submitForm() {
  document.getElementById("main").innerHTML = `
    <div class="card">
      <h2>確認中...</h2>
      <p>セキュリティ状態をチェックしています</p>
      <br>
      <p style="color:red;">
        ⚠ 注意：この画面はフィッシング詐欺の例です<br><br>
        実際には情報は送信されていません。<br><br>
        ・URLを確認する<br>
        ・安易に情報を入力しない<br>
        ・公式サイトからアクセスする
      </p>
    </div>
  `;
}
</script>

</body>
</html>
