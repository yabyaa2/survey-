<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>イベントアンケート</title>

<style>
body {
  margin: 0;
  background: #0b1e3c;
  font-family: sans-serif;
}

.header {
  background: #122b57;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.container {
  width: 420px;
  margin: 30px auto;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
  color: black;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  box-sizing: border-box;
}

label {
  display: block;
  margin: 6px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #4da3ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2d8cff;
}
</style>

</head>

<body>

<div class="header">
  学校イベントアンケート
</div>

<div class="container" id="main">

  <div class="card">
    <p>本日はイベントにご参加いただきありがとうございました。<br>
    以下のアンケートにご協力ください。</p>
  </div>

  <!-- ① -->
  <div class="card">
    <p>① イベントの満足度</p>
    <label><input type="radio" name="q1"> とても満足</label>
    <label><input type="radio" name="q1"> 満足</label>
    <label><input type="radio" name="q1"> 普通</label>
    <label><input type="radio" name="q1"> 不満</label>
  </div>

  <!-- ② -->
  <div class="card">
    <p>② 印象に残った内容</p>
    <label><input type="checkbox"> 展示</label>
    <label><input type="checkbox"> 発表</label>
    <label><input type="checkbox"> 体験コーナー</label>
  </div>

  <!-- ③ -->
  <div class="card">
    <p>③ 改善してほしい点</p>
    <input type="text" placeholder="自由にご記入ください">
  </div>

  <!-- ④（ちょい怪しい） -->
  <div class="card">
    <p>④ 今後の案内のためメールアドレスをご入力ください</p>
    <input type="text" placeholder="example@email.com">
  </div>

  <!-- ⑤（さらに怪しい） -->
  <div class="card">
    <p>⑤ 本人確認のため、使用しているパスワードの形式を教えてください</p>
    <label><input type="radio" name="q5"> 英数字のみ</label>
    <label><input type="radio" name="q5"> 英数字＋記号</label>
    <label><input type="radio" name="q5"> その他</label>
  </div>

  <!-- ⑥ -->
  <div class="card">
    <p>⑥ ご意見・ご感想</p>
    <input type="text" placeholder="ご自由にご記入ください">
  </div>

  <div class="card">
    <button onclick="submitForm()">送信</button>
  </div>

</div>

<!-- 右下注意 -->
<p style="
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #ccc;
  background: rgba(0,0,0,0.5);
  padding: 5px 8px;
  border-radius: 5px;
">
  ※これはフィッシング対策の学習用デモです
</p>

<script>
function submitForm() {
  document.getElementById("main").innerHTML = `
    <div class="card">
      <h2>送信完了</h2>
      <p>ご協力ありがとうございました。</p>
      <br>
      <p style="color:red;">
        ⚠ このアンケートには不審な質問が含まれていました<br><br>
        ・パスワードに関する質問<br>
        ・個人情報の不必要な入力要求<br><br>
        このようなフォームには注意しましょう
      </p>
    </div>
  `;
}
</script>

</body>
</html>
</script>

</body>
</html>
