<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アンケートフォーム</title>

<style>
body {
  margin: 0;
  background: #0b1e3c;
  font-family: sans-serif;
}

.header {
  background: #122b57;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.container {
  width: 420px;
  margin: 30px auto;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
  color: black;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  box-sizing: border-box;
}

label {
  display: block;
  margin: 6px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #4da3ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">
  学校アンケート
</div>

<div class="container" id="main">

  <div class="card">
    <p>アンケートにご協力ください。</p>
  </div>

  <!-- SNS -->
  <div class="card">
    <p>① よく利用するSNSは？</p>
    <label><input type="radio" name="q1"> Instagram</label>
    <label><input type="radio" name="q1"> X</label>
    <label><input type="radio" name="q1"> TikTok</label>
  </div>

  <!-- 時間 -->
  <div class="card">
    <p>② SNSの利用時間</p>
    <label><input type="radio" name="q2"> 1時間未満</label>
    <label><input type="radio" name="q2"> 1〜3時間</label>
    <label><input type="radio" name="q2"> 3時間以上</label>
  </div>

  <!-- メアド -->
  <div class="card">
    <p>③ 結果共有のためメールアドレスを入力してください</p>
    <input type="text" placeholder="example@email.com">
    <p style="font-size:12px; color:gray;">
      ※結果の共有以外には使用しません（デモ）
    </p>
  </div>

  <!-- 感想 -->
  <div class="card">
    <p>④ 感想</p>
    <input type="text">
  </div>

  <div class="card">
    <button onclick="submitForm()">送信</button>
  </div>

</div>

<!-- 注意 -->
<p style="
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #ccc;
  background: rgba(0,0,0,0.5);
  padding: 5px 8px;
  border-radius: 5px;
">
  ※これは調査用デモページです
</p>

<script>
function submitForm() {
  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      color:white;
      flex-direction:column;
      text-align:center;
    ">
      <h1 style="color:red; font-size:40px;">
        ⚠ 注意
      </h1>
      <p style="font-size:20px;">
        あなたは個人情報を入力しました
      </p>
      <br>
      <p>
        このようなフォームでは<br>
        情報を入力しないようにしましょう
      </p>
      <br>
      <p style="color:#aaa; font-size:14px;">
        ・入力前にURLを確認<br>
        ・不必要な情報要求に注意<br>
        ・公式サイトからアクセス
      </p>
    </div>
  `;
}
</script>

</body>
</html>
</script>

</body>
</html>
