<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フィッシング詐欺デモ</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b1e3c; /* ネイビー */
  font-family: sans-serif;
  color: white;
}

.box {
  background: #122b57;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #4da3ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
}

.warning {
  font-size: 12px;
  margin-top: 15px;
  color: #ffcc00;
}
</style>
</head>

<body>

<div class="box" id="formBox">
  <h2>ログイン</h2>
  
  <input type="text" placeholder="メールアドレス">
  <input type="password" placeholder="パスワード">

  <button onclick="showFake()">送信</button>

  <div class="warning">
    ※これはフィッシング詐欺のデモです（実際には送信されません）
  </div>
</div>

<script>
function showFake() {
  document.getElementById("formBox").innerHTML = `
    <h2>送信中...</h2>
    <p>データを処理しています</p>
    <br>
    <img src="https://media.giphy.com/media/y1ZBcOGOOtlpC/giphy.gif" width="200">
    <p style="color:red; margin-top:20px;">
      ⚠ フィッシング詐欺に注意！<br>
      このような画面に騙されないように！
    </p>
  `;
}
</script>

</body>
</html>
</script>

</body>
</html>
